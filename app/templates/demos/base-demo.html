<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — LeadForge AI Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#00A3FF', accent: '#1E90FF', dark: '#05060A', light: '#E6F1FF' },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #05060A; }
        ::-webkit-scrollbar-thumb { background: rgba(0,163,255,0.3); border-radius: 3px; }
        .neon { text-shadow: 0 0 10px rgba(0,163,255,0.5), 0 0 20px rgba(0,163,255,0.3); }
        .glow-border { box-shadow: 0 0 15px rgba(0,163,255,0.1), inset 0 0 15px rgba(0,163,255,0.05); }
    </style>
</head>
<body class="bg-dark text-light font-sans antialiased">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-dark/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <span class="text-xl font-bold text-primary neon">LeadForge</span>
                <span class="text-xl font-light text-light/70">AI</span>
            </a>
            <a href="/#contact" class="px-4 py-2 bg-primary text-dark text-sm font-semibold rounded-lg hover:bg-accent transition-all">Get Started</a>
        </div>
    </nav>

    <section class="pt-24 pb-16 text-center px-4">
        <span class="text-primary text-xs font-semibold tracking-wider uppercase">{{ tag }}</span>
        <h1 class="text-3xl md:text-5xl font-black mt-3 mb-4">{{ title }}</h1>
        <p class="text-light/50 max-w-xl mx-auto">{{ subtitle }}</p>
    </section>

    <section class="px-4 pb-24">
        <div class="max-w-5xl mx-auto">
            {% block demo_content %}{% endblock %}
        </div>
    </section>

    <footer class="border-t border-white/5 py-8 text-center text-xs text-light/30">
        <p>&copy; 2026 LeadForge AI — Demo Preview</p>
    </footer>
</body>
</html>
