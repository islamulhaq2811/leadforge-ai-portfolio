{% extends "demos/base-demo.html" %}
{% block demo_content %}
<div class="rounded-2xl border border-white/5 overflow-hidden">
    <div class="bg-white/[0.03] px-6 py-4 border-b border-white/5 flex items-center justify-between">
        <div class="flex items-center gap-4 text-sm">
            <span class="text-primary font-semibold">Dashboard</span>
            <span class="text-light/40">Analytics</span>
            <span class="text-light/40">Users</span>
            <span class="text-light/40">Settings</span>
        </div>
        <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center text-xs text-primary font-bold">A</div>
    </div>
    <div class="p-6 md:p-8">
        <div class="grid md:grid-cols-4 gap-4 mb-8">
            <div class="p-4 rounded-xl bg-white/[0.02] border border-white/5">
                <div class="text-xs text-light/40">MRR</div>
                <div class="text-2xl font-bold text-primary mt-1">$48.2k</div>
                <div class="text-xs text-green-400 mt-1">+12.3%</div>
            </div>
            <div class="p-4 rounded-xl bg-white/[0.02] border border-white/5">
                <div class="text-xs text-light/40">Active Users</div>
                <div class="text-2xl font-bold text-primary mt-1">3,847</div>
                <div class="text-xs text-green-400 mt-1">+8.1%</div>
            </div>
            <div class="p-4 rounded-xl bg-white/[0.02] border border-white/5">
                <div class="text-xs text-light/40">Conversion</div>
                <div class="text-2xl font-bold text-primary mt-1">5.2%</div>
                <div class="text-xs text-green-400 mt-1">+2.4%</div>
            </div>
            <div class="p-4 rounded-xl bg-white/[0.02] border border-white/5">
                <div class="text-xs text-light/40">Churn</div>
                <div class="text-2xl font-bold text-primary mt-1">2.1%</div>
                <div class="text-xs text-red-400 mt-1">-0.3%</div>
            </div>
        </div>
        <div class="h-48 rounded-xl bg-gradient-to-r from-primary/5 via-primary/10 to-accent/5 border border-white/5 flex items-center justify-center">
            <div class="text-center">
                <div class="text-lg font-semibold text-light/50">Revenue Growth Chart</div>
                <div class="flex items-end gap-2 mt-4 justify-center h-20">
                    <div class="w-8 bg-primary/30 rounded-t" style="height: 40px"></div>
                    <div class="w-8 bg-primary/40 rounded-t" style="height: 55px"></div>
                    <div class="w-8 bg-primary/50 rounded-t" style="height: 70px"></div>
                    <div class="w-8 bg-primary/60 rounded-t" style="height: 85px"></div>
                    <div class="w-8 bg-primary rounded-t" style="height: 100px"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
