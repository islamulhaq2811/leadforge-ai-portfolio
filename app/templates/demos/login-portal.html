{% extends "demos/base-demo.html" %}
{% block demo_content %}
<div class="max-w-md mx-auto">
    <div class="rounded-2xl border border-white/5 bg-white/[0.02] p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto rounded-full bg-primary/20 flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold">Welcome Back</h2>
            <p class="text-sm text-light/50 mt-1">Sign in to your account</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-light/60 mb-2">Email</label>
                <div class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-light/30 text-sm">demo@leadforge.ai</div>
            </div>
            <div>
                <label class="block text-sm text-light/60 mb-2">Password</label>
                <div class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-light/30 text-sm">••••••••</div>
            </div>
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 text-light/40">
                    <input type="checkbox" disabled checked class="accent-primary"> Remember me
                </label>
                <a href="#" class="text-primary hover:underline">Forgot password?</a>
            </div>
            <button disabled class="w-full py-3 bg-primary text-dark font-bold rounded-lg text-sm">Sign In</button>
        </div>
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
            <div class="relative flex justify-center"><span class="bg-dark px-4 text-xs text-light/30">or continue with</span></div>
        </div>
        <div class="grid grid-cols-3 gap-3">
            <div class="p-3 rounded-lg border border-white/5 text-center text-light/40 text-sm hover:border-primary/30 transition-colors cursor-default">G</div>
            <div class="p-3 rounded-lg border border-white/5 text-center text-light/40 text-sm hover:border-primary/30 transition-colors cursor-default">f</div>
            <div class="p-3 rounded-lg border border-white/5 text-center text-light/40 text-sm hover:border-primary/30 transition-colors cursor-default">in</div>
        </div>
        <p class="text-center text-xs text-light/30 mt-6">
            Don't have an account? <a href="#" class="text-primary">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
