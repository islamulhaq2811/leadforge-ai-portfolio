<section id="contact" class="relative py-24 md:py-32 bg-dark/50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid lg:grid-cols-2 gap-12 lg:gap-20">
            <div>
                <span class="text-primary text-sm font-semibold tracking-wider uppercase">Contact</span>
                <h2 class="text-3xl md:text-5xl font-bold mt-3 mb-6">Let's Build Your<br>Next Big Thing</h2>
                <p class="text-light/50 leading-relaxed mb-8">
                    Ready to scale your business with AI-powered systems? Tell us about your project and we'll create a custom strategy.
                </p>
                <div class="space-y-4">
                    <div class="flex items-center gap-3 text-sm text-light/60">
                        <div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center flex-shrink-0">
                            <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                        </div>
                       forgeailead9@gmail.com
                    </div>
                    <div class="flex items-center gap-3 text-sm text-light/60">
                        <div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center flex-shrink-0">
                            <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                        </div>
                        Pakistan — Lahore, Punjab
                    </div>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-8 border border-white/10">
                <form id="contact-form" class="space-y-5">
                    <div class="grid sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-light/70 mb-2">Name</label>
                            <input type="text" name="name" required class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-light placeholder-light/20 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-light/70 mb-2">Email</label>
                            <input type="email" name="email" required class="w-full px-4 py-3 bg-black/5 border border-white/10 rounded-lg text-light placeholder-light/20 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-light/70 mb-2">Project Type</label>
                        <select name="project_type" class="w-full px-4 py-3 bg-[#0d1117] border border-white/10 rounded-lg text-light focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all">
                            <option value="" disabled selected>Select a service</option>
                            <option value="website" style="background:#0d1117;color:#e6f1ff;padding:8px;">Website Development</option>
                            <option value="ai-agents" style="background:#0d1117;color:#e6f1ff;padding:8px;">AI Agents & Automation</option>
                            <option value="chatbot" style="background:#0d1117;color:#e6f1ff;padding:8px;">Chatbot</option>
                            <option value="saas" style="background:#0d1117;color:#e6f1ff;padding:8px;">SaaS MVP</option>
                            <option value="automation" style="background:#0d1117;color:#e6f1ff;padding:8px;">Business Automation</option>
                            <option value="other" style="background:#0d1117;color:#e6f1ff;padding:8px;">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-light/70 mb-2">Message</label>
                        <textarea name="message" rows="4" required class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-light placeholder-light/20 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all resize-none" placeholder="Tell us about your project..."></textarea>
                    </div>
                    <button type="submit" class="w-full py-4 bg-primary text-dark font-bold rounded-lg hover:bg-accent transition-all hover:shadow-lg hover:shadow-primary/30 text-lg">
                        Start Project
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
